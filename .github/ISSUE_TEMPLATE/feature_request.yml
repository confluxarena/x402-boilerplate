name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What feature would you like to see?
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Use Case
      description: Why is this feature needed? What problem does it solve?
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - PHP Backend
        - Facilitator (Node.js)
        - Demo Page (Frontend)
        - AI Agent (CLI)
        - Docker
        - Documentation
        - Other
    validations:
      required: true
