name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `docker compose up -d`
        2. Open http://localhost
        3. Click "Pay with Wallet"
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - PHP Backend
        - Facilitator (Node.js)
        - Demo Page (Frontend)
        - AI Agent (CLI)
        - Docker
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Node.js Version
      placeholder: "20.x"
